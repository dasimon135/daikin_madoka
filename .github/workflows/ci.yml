name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - madoka
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Python sources
        run: |
          ruff check .

      - name: Syntax check
        run: |
          python -m compileall -q .

  tests:
    # The Home Assistant test harness is Linux-only (imports fcntl),
    # so pytest runs here rather than on Windows dev machines.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -q --cov=custom_components/daikin_madoka --cov-report=term-missing

  mypy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # requirements-test.txt pins homeassistant (via the pytest plugin) and
      # pymadoka-ng, which mypy needs installed to see their type hints.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt mypy

      - name: Type check
        run: |
          python -m mypy
