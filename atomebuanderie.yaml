esphome:
  name: atomebuanderie
  friendly_name: AtomeBuanderie

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      # Bluetooth core
      CONFIG_BT_ENABLED: y
      CONFIG_BT_BLE_SMP_ENABLE: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_NIMBLE_ENABLED: n
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: y
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: y
      # Bonding storage in NVS - CRITICAL for pairing persistence
      CONFIG_BT_STACK_NO_LOG: n
      CONFIG_BLE_SM_SC: y
      # Use Legacy pairing (some devices don't support Secure Connections)
      CONFIG_BLE_SM_LEGACY: y

logger:
  level: DEBUG
  logs:
    esp32_ble_tracker: DEBUG
    ble_client: DEBUG
    madoka: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "fallback123"

# Enable Home Assistant API
api:
  encryption:
    key: "wbaKljMp04CIKnHKocMhxbmXP2PkITVI9YdYYAMBAEI="

ota:
  - platform: esphome
    password: "d7e1a35c24bd772f925b842fbd25e780"

web_server:
  port: 80

# 🔥 CORRECTION : Utilise les fichiers locaux corrigés
external_components:
  - source:
      type: local
      path: esphome_components
    components: [madoka, ble_client]

# Configuration BLE globale - CRITICAL pour le pairing MITM
esp32_ble:
  io_capability: display_yes_no  # Permet le Numeric Comparison pairing

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: true

ble_client:
  - mac_address: "F0:B3:1E:87:AF:FE"
    id: madoka_salon
    on_disconnect:
      then:
        - logger.log: "Madoka Salon déconnecté, reconnexion..."
        - delay: 10s
        - ble_client.connect: madoka_salon

  - mac_address: "1C:54:9E:90:E3:0E"
    id: madoka_parents
    on_disconnect:
      then:
        - logger.log: "Madoka Parents déconnecté, reconnexion..."
        - delay: 10s
        - ble_client.connect: madoka_parents

climate:
  - platform: madoka
    name: "Madoka salon"
    ble_client_id: madoka_salon
    update_interval: 15s  # 15s au lieu de 10s pour limiter la charge BLE

  - platform: madoka
    name: "Madoka parents"
    ble_client_id: madoka_parents
    update_interval: 15s
