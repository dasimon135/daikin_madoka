# Configuration exemple ESPHome pour Daikin Madoka
#
# Ce fichier montre comment configurer un ESP32 (ex: M5Stack Atom Lite)
# pour contrôler des thermostats Madoka BRC1H via Bluetooth

substitutions:
  name: m5stack-atom-lite-madoka
  friendly_name: Madoka BLE Proxy

# Configuration de base pour M5Stack Atom Lite
# Ajustez selon votre matériel ESP32
packages:
  esphome.bluetooth-proxy: github://esphome/bluetooth-proxies/m5stack/m5stack-atom-lite.yaml@main

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Optionnel: logs détaillés pour le débogage
logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: esphome_components  # Chemin relatif depuis le dossier de config ESPHome
    components: [ madoka ]

# Configuration Bluetooth ESP32
esp32_ble_tracker:
  id: ble_tracker       # Requis pour le switch de ré-appairage (voir ci-dessous)
  max_connections: 2  # Limite matérielle de l'ESP32

# IMPORTANT: Désactiver le proxy Bluetooth classique
# car nous utilisons ble_client directement
bluetooth_proxy:
  active: false

# Configuration des clients BLE pour chaque thermostat
ble_client:
  # Premier thermostat
  - mac_address: "F0:B3:1E:87:AF:FE"  # Remplacez par votre adresse MAC
    id: madoka_salon
    on_disconnect:
      then:
        # Reconnexion automatique seulement si le proxy est actif
        - if:
            condition:
              switch.is_on: proxy_enabled
            then:
              - ble_client.connect: madoka_salon
  
  # Deuxième thermostat (optionnel)
  - mac_address: "1C:54:9E:90:E3:0E"  # Remplacez par votre adresse MAC
    id: madoka_chambre
    on_disconnect:
      then:
        - if:
            condition:
              switch.is_on: proxy_enabled
            then:
              - ble_client.connect: madoka_chambre

# Entités climate pour chaque thermostat
climate:
  - platform: madoka
    name: "Madoka Salon"
    ble_client_id: madoka_salon
    update_interval: 15s  # Fréquence de mise à jour (en secondes)
    outdoor_temperature:
      name: "Madoka Salon Temp. Exterieure"
    clean_filter:
      name: "Madoka Salon Filtre a Nettoyer"
    firmware_version:
      name: "Madoka Salon Firmware"
    eye_brightness:
      name: "Madoka Salon Luminosite LED"
    reset_filter:
      name: "Madoka Salon Reset Filtre"
  
  - platform: madoka
    name: "Madoka Chambre"
    ble_client_id: madoka_chambre
    update_interval: 15s
    outdoor_temperature:
      name: "Madoka Chambre Temp. Exterieure"
    clean_filter:
      name: "Madoka Chambre Filtre a Nettoyer"
    firmware_version:
      name: "Madoka Chambre Firmware"
    eye_brightness:
      name: "Madoka Chambre Luminosite LED"
    reset_filter:
      name: "Madoka Chambre Reset Filtre"

# ---------------------------------------------------------------------------
# Switch pour désactiver temporairement le BLE (ré-appairage téléphone)
#
# Problème : quand on supprime tous les appairages sur le Madoka pour reprendre
# la main avec l'appli téléphone, l'ESP32 se reconnecte en boucle et bloque
# le nouvel appairage du téléphone.
#
# Solution : désactiver le scan BLE ET déconnecter explicitement les clients
# depuis HA, faire les manipulations avec le téléphone, puis réactiver.
# ---------------------------------------------------------------------------
switch:
  - platform: template
    name: "Proxy Madoka Actif"
    id: proxy_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: start_ble
    turn_off_action:
      - script.execute: stop_ble

script:
  - id: stop_ble
    then:
      - logger.log: "Arret BLE - scan stop et deconnexion des thermostats"
      - lambda: |-
          id(ble_tracker).stop_scan();
      - ble_client.disconnect: madoka_salon
      - ble_client.disconnect: madoka_chambre

  - id: start_ble
    then:
      - logger.log: "Demarrage BLE - reprise du scan et reconnexion ESP32"
      - lambda: |-
          id(ble_tracker).start_scan();
      - ble_client.connect: madoka_salon
      - ble_client.connect: madoka_chambre

# Notes importantes:
# 1. Les thermostats doivent être appairés avec l'ESP32 avant utilisation
# 2. Vérifiez que les adresses MAC sont correctes avec 'bluetoothctl scan on'
# 3. N'oubliez pas de copier le dossier esphome_components dans votre config ESPHome
# 4. Le chemin 'path: esphome_components' doit être ajusté selon votre structure
